trigger:
  branches:
    include:
      - release        # Only trigger on release branch
  paths:
    exclude:
      - '*.md'
      - 'docs/**'
      - 'deploy/**'
      - 'azuredevops/**'
      - '.github/**'

pr: none               # Do NOT trigger on PRs — only on merge to release

pool:
  vmImage: 'ubuntu-latest'

variables:
  dotnetVersion: '10.0.x'
  nodeVersion: '22.x'
  buildConfiguration: 'Release'

stages:
  # ══════════════════════════════════════════════
  # STAGE: Build, Test & Package
  # ══════════════════════════════════════════════
  - stage: BuildAndPublish
    displayName: 'Build, Test & Publish Artifacts'
    jobs:
      - job: BuildJob
        displayName: 'Build API & Frontend'
        steps:
          # ── Setup ──
          - task: UseDotNet@2
            displayName: 'Install .NET SDK'
            inputs:
              packageType: 'sdk'
              version: '$(dotnetVersion)'

          - task: NodeTool@0
            displayName: 'Install Node.js'
            inputs:
              versionSpec: '$(nodeVersion)'

          # ── Backend: Restore, Build, Test ──
          - script: |
              cd services/api
              dotnet restore ServiceHub.sln
              dotnet build ServiceHub.sln -c $(buildConfiguration) --no-restore
            displayName: 'API: Restore & Build'

          - script: |
              cd services/api
              dotnet test ServiceHub.sln -c $(buildConfiguration) --no-build --logger trx --results-directory $(Agent.TempDirectory)/test-results
            displayName: 'API: Run Tests'

          - task: PublishTestResults@2
            displayName: 'Publish Test Results'
            inputs:
              testResultsFormat: 'VSTest'
              testResultsFiles: '$(Agent.TempDirectory)/test-results/**/*.trx'
            condition: always()

          # ── Backend: Publish ──
          - script: |
              cd services/api/src/ServiceHub.Api
              dotnet publish -c $(buildConfiguration) -o $(Build.ArtifactStagingDirectory)/api --no-build
            displayName: 'API: Publish'

          # ── Frontend: Install, Build ──
          - script: |
              cd apps/web
              npm ci
              npm run build
            displayName: 'UI: Install & Build'
            env:
              VITE_APPINSIGHTS_CONNECTION_STRING: ''   # Set at runtime via app settings

          # ── Copy SPA build into API's wwwroot ──
          - script: |
              cp -r apps/web/dist/* $(Build.ArtifactStagingDirectory)/api/wwwroot/
            displayName: 'Copy SPA into API wwwroot'

          # ── Publish artifact ──
          - publish: $(Build.ArtifactStagingDirectory)/api
            artifact: servicehub-api
            displayName: 'Publish Build Artifact'

  # ══════════════════════════════════════════════