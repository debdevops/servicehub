# CI workflow: build + unit tests on every push/PR. See deploy.yml for production deployment.
name: CI – Build & Unit Tests

on:
  push:
    branches:
      - main
      - develop
      - 'release'
      - 'bugfix/**'
      - 'feature/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - develop
      - 'release'
      - 'bugfix/**'
      - 'feature/**'
      - 'hotfix/**'


env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '22.x'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test-backend:
    name: Build & Test Backend (.NET)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore services/api/ServiceHub.sln

      - name: Build solution
        run: dotnet build services/api/ServiceHub.sln --no-restore --configuration Release

      - name: Run unit tests with coverage
        run: |
          dotnet test services/api/tests/ServiceHub.UnitTests/ServiceHub.UnitTests.csproj \
            --configuration Release \
            --settings services/api/coverlet.runsettings \
            --results-directory services/api/TestResults \
            --logger "console;verbosity=normal" \
            --logger "trx;LogFileName=results.trx"

      - name: Install report generator
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool \
            --version 5.4.3 2>/dev/null || true

      - name: Generate coverage report and enforce 60% threshold
        run: |
          reportgenerator \
            -reports:"services/api/TestResults/**/coverage.cobertura.xml" \
            -targetdir:"services/api/TestResults/CoverageReport" \
            -reporttypes:"TextSummary"

          echo "=== Coverage Summary ==="
          cat services/api/TestResults/CoverageReport/Summary.txt

          COVERAGE=$(grep -oP 'Line coverage: \K[\d.]+' \
            services/api/TestResults/CoverageReport/Summary.txt || echo "0")

          echo "Line coverage: ${COVERAGE}%"

          if awk "BEGIN {exit !($COVERAGE < 60)}"; then
            echo "❌ Coverage ${COVERAGE}% is below the required 60% threshold"
            exit 1
          fi
          echo "✅ Coverage ${COVERAGE}% meets the 60% threshold"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-backend-${{ github.run_number }}
          path: services/api/TestResults/CoverageReport/
          retention-days: 14

  build-and-test-frontend:
    name: Build & Test Frontend (React)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci --include=optional

      - name: Audit npm packages for vulnerabilities
        working-directory: apps/web
        run: |
          echo "=== npm audit — checking for known vulnerabilities ==="
          # --audit-level=high: fail only on HIGH or CRITICAL severity
          # --omit=dev: skip dev dependencies (they don't run in production)
          npm audit --audit-level=high --omit=dev || {
            echo ""
            echo "❌ High/critical severity vulnerabilities found in production npm dependencies."
            echo "   Run 'npm audit' locally to see details and 'npm audit fix' to fix automatically."
            exit 1
          }
          echo "✅ No high/critical npm vulnerabilities in production dependencies"

      - name: Run unit tests with coverage
        working-directory: apps/web
        run: npm run test:coverage

      - name: Check frontend coverage threshold (60%)
        working-directory: apps/web
        run: |
          if [ ! -f "coverage/coverage-summary.json" ]; then
            echo "⚠ Coverage file not found — skipping threshold check"
            exit 0
          fi

          # Extract total line coverage from vitest coverage JSON
          COVERAGE=$(node -e "
            const c = require('./coverage/coverage-summary.json');
            const total = c.total || c;
            const pct = total.lines?.pct ?? total.lines?.percent ?? 0;
            console.log(pct);
          " 2>/dev/null || echo "0")

          echo "Frontend line coverage: ${COVERAGE}%"

          if awk "BEGIN {exit !($COVERAGE < 60)}"; then
            echo "❌ Frontend coverage ${COVERAGE}% is below 60%"
            exit 1
          fi
          echo "✅ Frontend coverage ${COVERAGE}% meets the 60% threshold"

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend-${{ github.run_number }}
          path: apps/web/coverage/
          retention-days: 14

      - name: Type check with TypeScript
        working-directory: apps/web
        run: npx tsc -b

      - name: Verify production env file exists
        run: |
          if [ ! -f apps/web/.env.production ]; then
            echo "ERROR: apps/web/.env.production is missing. Create it with VITE_API_BASE_URL=/api/v1"
            exit 1
          fi

      - name: Build application
        working-directory: apps/web
        run: npm run build

  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [build-and-test-backend, build-and-test-frontend]
    if: always()

    steps:
      - name: Check build and test status
        run: |
          if [ "${{ needs.build-and-test-backend.result }}" != "success" ]; then
            echo "❌ Backend build/tests failed"
            exit 1
          fi
          if [ "${{ needs.build-and-test-frontend.result }}" != "success" ]; then
            echo "❌ Frontend build/tests failed"
            exit 1
          fi
          echo "✅ All builds and unit tests passed!"

  e2e-simulator:
    name: E2E — Simulator Mode (Playwright)
    runs-on: ubuntu-latest
    needs: [build-and-test-backend, build-and-test-frontend]
    # Run on pushes to main and on pull requests targeting main
    if: |
      github.ref == 'refs/heads/main' ||
      github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Restore .NET packages
        run: dotnet restore services/api/ServiceHub.sln

      - name: Build API (Release)
        # Build the full solution so all output artifacts (including Simulator) are in place
        run: dotnet build services/api/ServiceHub.sln --no-restore --configuration Release

      - name: Start API in Simulator mode
        env:
          ASPNETCORE_ENVIRONMENT: Simulator
          ASPNETCORE_URLS: http://localhost:5200
        run: |
          # Use --no-build since we already built the full solution above.
          # The Simulator project output is available as a transitive dep of ServiceHub.Api.
          dotnet run \
            --project services/api/src/ServiceHub.Api/ServiceHub.Api.csproj \
            --configuration Release \
            --no-build \
            --no-launch-profile > /tmp/servicehub_sim_api.log 2>&1 &
          echo "API_PID=$!" >> $GITHUB_ENV
          echo "API started with PID $!"

      - name: Wait for API health check
        run: |
          echo "Waiting for API to be ready (up to 120s)..."
          for i in $(seq 1 60); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5200/health/live 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ API is ready after $((i * 2))s (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "  ...${i}s — HTTP $HTTP_CODE"
            sleep 2
          done
          echo "❌ API did not become ready within 120s"
          echo "--- API startup log (last 60 lines) ---"
          tail -60 /tmp/servicehub_sim_api.log 2>/dev/null || echo "(no log file)"
          echo "--- Active dotnet processes ---"
          ps aux | grep dotnet || true
          echo "--- Port 5200 listener check ---"
          ss -tlnp 2>/dev/null | grep 5200 || netstat -tlnp 2>/dev/null | grep 5200 || echo "(port not bound)"
          exit 1

      - name: Verify simulator seeded
        run: |
          # Capture both stdout and stderr so we can diagnose 4xx/5xx responses
          STATUS=$(curl -sf http://localhost:5200/api/v1/simulator/status 2>/tmp/curl_err.txt) || {
            CURL_EXIT=$?
            echo "❌ curl failed with exit code $CURL_EXIT"
            echo "  (22 = HTTP 4xx/5xx; 7 = connection refused; 28 = timeout)"
            echo ""
            echo "--- curl stderr ---"
            cat /tmp/curl_err.txt 2>/dev/null || echo "(empty)"
            echo ""
            echo "--- Raw HTTP response ---"
            curl -sv http://localhost:5200/api/v1/simulator/status 2>&1 | head -40 || true
            echo ""
            echo "--- API log (last 60 lines) ---"
            tail -60 /tmp/servicehub_sim_api.log 2>/dev/null || echo "(no log file)"
            exit 1
          }
          echo "Simulator status response received"
          echo "--- Response keys ---"
          echo "$STATUS" | python3 -c "
          import json, sys
          s = json.load(sys.stdin)
          print(f'Keys: {list(s.keys())}')
          ns_count = len(s.get('namespaces', []))
          print(f'Namespaces seeded: {ns_count}')
          assert ns_count == 3, f'Expected 3 namespaces, got {ns_count}'
          for ns in s['namespaces']:
              print(f'  - {ns.get(\"name\",\"?\")} ({ns.get(\"provider\",\"?\")}): {ns.get(\"entityCount\",0)} entities')
          print('✅ Simulator seeded correctly')
          "

      - name: Install frontend dependencies
        run: cd apps/web && npm ci

      - name: Install Playwright browsers
        run: cd apps/web && npx playwright install chromium --with-deps

      - name: Run Playwright E2E tests
        run: cd apps/web && npm run test:e2e
        env:
          CI: true
          VITE_PROXY_TARGET: http://localhost:5200

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: apps/web/playwright-report/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ github.run_number }}
          path: apps/web/test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Stop API
        if: always()
        run: kill ${{ env.API_PID }} 2>/dev/null || true
