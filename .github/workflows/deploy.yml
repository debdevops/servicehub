name: Build and Deploy to Azure App Service

# Azure deployment is disabled — credentials (AZURE_APP_SERVICE_NAME,
# AZURE_PUBLISH_PROFILE) are not configured for local development.
# Re-enable by restoring the original 'on' triggers when deploying to Azure.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'deploy' to confirm Azure deployment"
        required: true

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '20.x'

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Validate deployment confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "deploy" ]; then
            echo "❌ You must type 'deploy' in the confirm field to proceed."
            exit 1
          fi
          echo "✅ Deployment confirmed"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build React SPA (outputs to API wwwroot)
        working-directory: apps/web
        run: npm run build
        # vite.config.ts build.outDir points to:
        # ../../services/api/src/ServiceHub.Api/wwwroot
        # So the React build is already inside the API project after this step.

      - name: Set up .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore .NET dependencies
        run: dotnet restore services/api/ServiceHub.sln

      - name: Build .NET solution
        run: dotnet build services/api/ServiceHub.sln --configuration Release --no-restore

      - name: Run unit tests — block deployment if tests fail
        run: |
          dotnet test services/api/tests/ServiceHub.UnitTests \
            --no-build \
            --configuration Release \
            --logger "console;verbosity=summary"
          echo "✅ All tests passed — proceeding with deployment"

      - name: Publish .NET API (includes wwwroot from React build)
        run: |
          dotnet publish services/api/src/ServiceHub.Api/ServiceHub.Api.csproj \
            --configuration Release \
            --output ./publish \
            --no-build

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_SERVICE_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: ./publish

      - name: Wait for application startup
        run: sleep 30

      - name: Health check — verify deployment succeeded
        run: |
          APP_URL="https://${{ secrets.AZURE_APP_SERVICE_NAME }}.azurewebsites.net"
          echo "Checking: ${APP_URL}/health"

          for i in 1 2 3 4 5; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 20 \
              "${APP_URL}/health" || echo "000")

            echo "Attempt ${i}/5: HTTP ${HTTP_STATUS}"

            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Application is healthy at ${APP_URL}"
              exit 0
            fi

            [ "$i" -lt "5" ] && sleep 15
          done

          echo "❌ Health check failed after 5 attempts — check Azure App Service logs"
          exit 1
