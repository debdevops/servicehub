# Dependabot configuration for ServiceHub
# Scans NuGet (.NET) and npm (React) packages daily for known vulnerabilities.
# Creates automated PRs to bump vulnerable packages.
# Free on all GitHub repos (public and private).
version: 2

updates:
  # .NET / NuGet packages
  - package-ecosystem: "nuget"
    directory: "/services/api"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    # Group all non-major updates into a single PR to reduce noise
    groups:
      microsoft-extensions:
        patterns:
          - "Microsoft.Extensions.*"
          - "Microsoft.EntityFrameworkCore.*"
          - "Microsoft.AspNetCore.*"
      azure-sdk:
        patterns:
          - "Azure.*"

  # npm packages (React frontend)
  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    # Ignore major-version bumps that require manual migration work.
    # TypeScript 6, Vite 8, and ESLint 10 have breaking changes; upgrade manually.
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitejs/plugin-react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      # Linux platform-specific optional binaries — bump all variants together manually.
      # These create noisy individual PRs per architecture variant.
      - dependency-name: "@rollup/rollup-linux-*"
      - dependency-name: "lightningcss-linux-*"
      - dependency-name: "@tailwindcss/oxide-linux-*"
      - dependency-name: "@esbuild/linux-*"
    groups:
      # React runtime and its types must move together.
      # @types/react-dom@19 requires @types/react@^19 — splitting them breaks npm ci.
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      tanstack:
        patterns:
          - "@tanstack/*"
      testing:
        patterns:
          - "@testing-library/*"
          - "vitest"
          - "@vitest/*"
      vite-and-build:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "typescript"
          - "tailwindcss"
          - "@tailwindcss/*"

  # GitHub Actions versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      time: "06:00"
      timezone: "Asia/Kolkata"
    commit-message:
      prefix: "chore(actions)"
